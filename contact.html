<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | CinemaHub</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- Navbar -->
  <nav class="fixed w-full bg-black/80 backdrop-blur-md z-50">

    <div class="container mx-auto flex justify-between items-center px-6 py-4">

      <a href="index.html" class="flex items-center gap-3">

        <img
          src="images/cinemahub-logo.png"
          class="w-12 h-12 rounded-full"
        >

        <h1 class="text-3xl font-bold">
          Cinema<span class="text-red-600">Hub</span>
        </h1>

      </a>

      <ul class="hidden md:flex gap-8 text-lg">

        <li>
          <a href="index.html" class="text-red-500">
            Home
          </a>
        </li>

        <li>
          <a href="movies.html" class="hover:text-red-500 transition">
            Movies
          </a>
        </li>

        <li>
          <a href="series.html" class="hover:text-red-500 transition">
            Series
          </a>
        </li>

        <li>
          <a href="trending.html" class="hover:text-red-500 transition">
            Trending
          </a>
        </li>

        <li>
          <a href="contact.html" class="hover:text-red-500 transition">
            Contact
          </a>
        </li>

      </ul>

    </div>

  </nav>

  <!-- Contact Form -->
  <section class="min-h-screen flex items-center justify-center px-6 py-20">

    <div class="bg-zinc-900 p-10 rounded-3xl shadow-2xl w-full max-w-2xl">

      <h2 class="text-5xl font-bold text-center mb-4">
        Contact Us
      </h2>

      <p class="text-gray-400 text-center mb-10">
        Have questions? Send us a message.
      </p>

      <form class="space-y-6">

        <input
          type="text"
          placeholder="Your Name"
          class="w-full p-4 rounded-xl bg-zinc-800 border border-gray-700 focus:outline-none focus:border-red-500"
        >

        <input
          type="email"
          placeholder="Your Email"
          class="w-full p-4 rounded-xl bg-zinc-800 border border-gray-700 focus:outline-none focus:border-red-500"
        >

        <textarea
          rows="6"
          placeholder="Your Message"
          class="w-full p-4 rounded-xl bg-zinc-800 border border-gray-700 focus:outline-none focus:border-red-500"
        ></textarea>

        <button
          class="w-full bg-red-600 py-4 rounded-xl text-lg font-bold hover:bg-red-700 transition"
        >
          Send Message
        </button>

      </form>

    </div>

  </section>

</body>
</html>
