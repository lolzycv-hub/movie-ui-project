<!DOCTYPE html>
<html lang="th">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Movie Detail | CinemaHub</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

  <!-- Navbar -->
  <nav class="fixed w-full bg-black/80 backdrop-blur-md z-50">

    <div class="container mx-auto flex justify-between items-center px-6 py-4">

      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-3">

        <img
          src="images/cinemahub-logo.png"
          alt="CinemaHub Logo"
          class="w-12 h-12 rounded-full object-cover border border-red-500"
        >

        <h1 class="text-3xl font-bold tracking-wide">
          Cinema<span class="text-red-600">Hub</span>
        </h1>

      </a>

      <!-- Menu -->
      <ul class="hidden md:flex gap-8 text-lg">

        <li>
          <a href="index.html" class="hover:text-red-500 transition">
            Home
          </a>
        </li>

        <li>
          <a href="movies.html" class="hover:text-red-500 transition">
            Movies
          </a>
        </li>

        <li>
          <a href="series.html" class="hover:text-red-500 transition">
            Series
          </a>
        </li>

        <li>
          <a href="trending.html" class="hover:text-red-500 transition">
            Trending
          </a>
        </li>

        <li>
          <a href="contact.html" class="hover:text-red-500 transition">
            Contact
          </a>
        </li>

      </ul>

    </div>

  </nav>

  <!-- Movie Detail -->
  <section class="pt-32 px-6 md:px-14 pb-20">

    <div class="grid md:grid-cols-2 gap-12 items-center">

      <!-- Movie Image -->
      <img
        id="movieImage"
        src=""
        class="rounded-2xl shadow-2xl w-full"
      >

      <!-- Movie Content -->
      <div>

        <h1
          id="movieTitle"
          class="text-5xl md:text-6xl font-bold mb-6"
        >
        </h1>

        <p
          id="movieDesc"
          class="text-gray-300 text-lg leading-8 mb-8"
        >
        </p>

        <!-- Buttons -->
        <div class="flex flex-wrap gap-4">

          <!-- Watch -->
          <button
            class="bg-red-600 px-8 py-4 rounded-xl text-lg font-bold hover:bg-red-700 transition"
          >
            ▶ Watch Now
          </button>

          <!-- Trailer -->
          <button
            onclick="openModal()"
            class="bg-zinc-700 px-8 py-4 rounded-xl text-lg hover:bg-zinc-600 transition"
          >
            Trailer
          </button>

          <!-- Back -->
          <a
            href="index.html"
            class="bg-zinc-800 px-8 py-4 rounded-xl text-lg hover:bg-zinc-700 transition"
          >
            ← Back
          </a>

        </div>

      </div>

    </div>

  </section>

  <!-- Modal -->
  <div
    id="modal"
    class="fixed inset-0 bg-black/80 hidden justify-center items-center z-50"
  >

    <div class="bg-zinc-900 p-8 rounded-2xl w-[90%] max-w-3xl relative">

      <!-- Close -->
      <button
        onclick="closeModal()"
        class="absolute top-3 right-4 text-4xl"
      >
        ×
      </button>

      <h2 class="text-3xl font-bold mb-6">
        Movie Trailer
      </h2>

      <!-- Video -->
      <div class="aspect-video">

        <iframe
          class="w-full h-full rounded-xl"
          src="https://www.youtube.com/embed/b9EkMc79ZSU"
          allowfullscreen
        ></iframe>

      </div>

    </div>

  </div>

  <!-- Movie Script -->
  <script>

    const params = new URLSearchParams(window.location.search);

    const movie = params.get("movie");

    const movieTitle = document.getElementById("movieTitle");
    const movieDesc = document.getElementById("movieDesc");
    const movieImage = document.getElementById("movieImage");

    if(movie === "stranger") {

      movieTitle.innerText = "Stranger Things";

      movieDesc.innerText =
        "A science fiction horror series set in a small town with supernatural mysteries.";

      movieImage.src = "images/1.jpg";

    }

    else if(movie === "wednesday") {

      movieTitle.innerText = "Wednesday";

      movieDesc.innerText =
        "Wednesday Addams investigates mysterious crimes at Nevermore Academy.";

      movieImage.src = "images/2.jpg";

    }

    else if(movie === "avatar") {

      movieTitle.innerText = "Avatar";

      movieDesc.innerText =
        "An epic science fiction film directed by James Cameron.";

      movieImage.src = "images/3.jpg";

    }

    else if(movie === "batman") {

      movieTitle.innerText = "Batman";

      movieDesc.innerText =
        "Batman fights crime and protects Gotham City from villains.";

      movieImage.src = "images/4.jpg";

    }

    else if(movie === "avengers") {

      movieTitle.innerText = "Avengers";

      movieDesc.innerText =
        "Marvel superheroes unite to save the world from destruction.";

      movieImage.src = "images/5.jpg";

    }

    // Modal Functions
    function openModal() {

      document.getElementById("modal").classList.remove("hidden");

      document.getElementById("modal").classList.add("flex");

    }

    function closeModal() {

      document.getElementById("modal").classList.add("hidden");

      document.getElementById("modal").classList.remove("flex");

    }

  </script>

</body>
</html>
