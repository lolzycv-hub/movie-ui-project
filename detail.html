<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Movie Detail | CinemaHub</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- Navbar -->
  <nav class="fixed w-full bg-black/80 backdrop-blur-md z-50">

    <div class="container mx-auto flex justify-between items-center px-6 py-4">

      <a href="index.html" class="flex items-center gap-3">

        <img
          src="images/cinemahub-logo.png"
          class="w-12 h-12 rounded-full"
        >

        <h1 class="text-3xl font-bold">
          Cinema<span class="text-red-600">Hub</span>
        </h1>

      </a>

      <ul class="hidden md:flex gap-8 text-lg">

        <li>
          <a href="index.html" class="text-red-500">
            Home
          </a>
        </li>

        <li>
          <a href="movies.html" class="hover:text-red-500 transition">
            Movies
          </a>
        </li>

        <li>
          <a href="series.html" class="hover:text-red-500 transition">
            Series
          </a>
        </li>

        <li>
          <a href="trending.html" class="hover:text-red-500 transition">
            Trending
          </a>
        </li>

        <li>
          <a href="contact.html" class="hover:text-red-500 transition">
            Contact
          </a>
        </li>

      </ul>

    </div>

  </nav>

  <!-- Detail -->
  <section class="pt-32 px-6 pb-20">

    <div class="grid md:grid-cols-2 gap-10 items-center">

      <img
        src="images/1.jpg"
        class="rounded-2xl shadow-2xl"
      >

      <div>

        <h1 class="text-6xl font-bold mb-6">
          Stranger Things
        </h1>

        <p class="text-gray-300 text-lg leading-8 mb-8">
          Stranger Things is a science fiction horror drama television series
          created for Netflix. The story follows mysterious supernatural events
          in a small town.
        </p>

        <div class="flex gap-4">

          <button
            class="bg-red-600 px-8 py-4 rounded-xl text-lg font-bold hover:bg-red-700 transition"
          >
            ▶ Watch Now
          </button>

          <a
            href="index.html"
            class="bg-zinc-800 px-8 py-4 rounded-xl text-lg hover:bg-zinc-700 transition"
          >
            ← Back
          </a>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
