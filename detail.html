        <li><a href="trending.html" class="hover:text-red-500 transition">Trending</a></li>

      <ul class="flex flex-col gap-1 text-base">

        <li><a href="movies.html" class="block py-2 hover:text-red-500 transition">Movies</a></li>
        <li><a href="series.html" class="block py-2 hover:text-red-500 transition">Series</a></li>
        <li><a href="trending.html" class="block py-2 hover:text-red-500 transition">Trending</a></li>
        <li><a href="contact.html" class="block py-2 hover:text-red-500 transition">Contact</a></li>

  <!-- Detail -->
  <section class="pt-20 md:pt-32 px-4 sm:px-6 pb-16 md:pb-20">
    <div class="grid md:grid-cols-2 gap-6 md:gap-10 items-start md:items-center">

      <img id="movie-poster" src="" alt=""
        class="rounded-xl md:rounded-2xl shadow-2xl w-full max-w-sm mx-auto md:max-w-none">

      <div class="mt-2 md:mt-0">
        <h1 id="movie-title" class="text-2xl sm:text-3xl md:text-4xl lg:text-6xl font-bold mb-3 md:mb-6"></h1>
        <div id="movie-badges" class="flex flex-wrap gap-2 mb-4"></div>
        <p id="movie-desc" class="text-gray-300 text-sm sm:text-base md:text-lg leading-6 sm:leading-7 md:leading-8 mb-6 md:mb-8"></p>
        <div class="flex flex-wrap gap-2 md:gap-4">
          <button class="bg-red-600 px-4 py-2.5 sm:px-6 sm:py-3 md:px-8 md:py-4 rounded-xl text-sm md:text-lg font-bold hover:bg-red-700 transition">
            ▶ Watch Now
          </button>
          <button onclick="openModal()"
            class="bg-zinc-700 px-4 py-2.5 sm:px-6 sm:py-3 md:px-8 md:py-4 rounded-xl text-sm md:text-lg hover:bg-zinc-600 transition">
            Trailer
          </button>
          <a id="back-btn" href="index.html"
            class="bg-zinc-800 px-4 py-2.5 sm:px-6 sm:py-3 md:px-8 md:py-4 rounded-xl text-sm md:text-lg hover:bg-zinc-700 transition">
            ← Back
          </a>
        </div>
      </div>

    </div>
  </section>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/80 hidden justify-center items-center z-50 px-4">
    <div class="bg-zinc-900 p-5 sm:p-6 md:p-8 rounded-xl md:rounded-2xl w-full max-w-xs sm:max-w-lg md:max-w-3xl relative">
      <button onclick="closeModal()" class="absolute top-3 right-4 text-2xl md:text-4xl">×</button>
      <h2 class="text-lg sm:text-xl md:text-3xl font-bold mb-4 md:mb-6">Movie Trailer</h2>
      <div class="aspect-video">
        <iframe id="trailer-frame" class="w-full h-full rounded-lg md:rounded-xl"
          src="" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>

      9:  { title: "สุขเล็กๆที่เรียกว่าเธอ", img: "images/18.jpg",  genre: ["Romance","Drama"],     year: 2023, desc: "ซีรีส์โรแมนติกที่ชวนให้หัวใจอบอุ่น เรื่องราวความรักเล็กๆ ที่งดงามและน่าประทับใจ ผ่านตัวละครที่มีเสน่ห์และน่าติดตาม",                                                                        trailer: "https://www.youtube.com/embed/dQw4w9WgXcQ", back: "series.html" },
      10: { title: "Loki",                    img: "https://picsum.photos/300/450?13", genre: ["Sci-Fi","Fantasy"], year: 2021, desc: "The mercurial villain Loki resumes his role as the God of Mischief in a new series that takes place after the events of Avengers: Endgame.",                              trailer: "https://www.youtube.com/embed/nW948Va-l10", back: "index.html" },

      13: { title: "John Wick",               img: "https://picsum.photos/300/450?16", genre: ["Action","Thriller"], year: 2014, desc: "An ex-hitman comes out of retirement to track down the gangsters that killed his dog, a gift from his recently deceased wife.",                                         trailer: "https://www.youtube.com/embed/2AUmvWm5ZDQ", back: "index.html" },

      17: { title: "Movie 11",                img: "images/11.jpg",  genre: ["Drama"],               year: 2022, desc: "A gripping drama that explores the complexities of human relationships and the challenges of modern life.",                                                                                  trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },
      18: { title: "Movie 7",                 img: "images/7.jpg",   genre: ["Thriller"],            year: 2021, desc: "A heart-pounding thriller filled with unexpected twists and turns that will leave you breathless.",                                                                                          trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },

      21: { title: "Movie 10",                img: "images/10.jpg",  genre: ["Romance"],             year: 2023, desc: "A beautiful love story that reminds us that true love can be found in the most unexpected places.",                                                                                           trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },
      22: { title: "Movie 12",                img: "images/12.jpg",  genre: ["Action"],              year: 2022, desc: "An explosive action film featuring breathtaking stunts and an unforgettable story.",                                                                                                          trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },
      23: { title: "Movie 13",                img: "images/13.jpg",  genre: ["Drama"],               year: 2021, desc: "A powerful drama that shines a light on important social issues through compelling storytelling.",                                                                                             trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },
      24: { title: "Movie 14",                img: "images/14.jpg",  genre: ["Sci-Fi"],              year: 2023, desc: "A visually stunning science fiction epic that pushes the boundaries of imagination.",                                                                                                          trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },
      25: { title: "Movie 15",                img: "images/15.jpg",  genre: ["Mystery"],             year: 2022, desc: "A captivating mystery that keeps you guessing until the very last moment.",                                                                                                                    trailer: "https://www.youtube.com/embed/b9EkMc79ZSU", back: "movies.html" },
    };

    // ── โหลดข้อมูลจาก URL param ──────────────────────────────
    function loadMovie() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get("id")) || 1;
      const movie = movies[id] || movies[1];

      document.title = movie.title + " | CinemaHub";
      document.getElementById("movie-poster").src = movie.img;
      document.getElementById("movie-poster").alt = movie.title;
      document.getElementById("movie-title").textContent = movie.title;
      document.getElementById("movie-desc").textContent = movie.desc;
      document.getElementById("trailer-frame").src = "";  // reset on load

      // badges
      const badgeContainer = document.getElementById("movie-badges");
      badgeContainer.innerHTML = "";
      movie.genre.forEach(g => {
        const span = document.createElement("span");
        span.className = "bg-zinc-700 text-xs sm:text-sm px-3 py-1 rounded-full";
        span.textContent = g;
        badgeContainer.appendChild(span);
      });
      const yearSpan = document.createElement("span");
      yearSpan.className = "bg-red-600/30 text-red-400 text-xs sm:text-sm px-3 py-1 rounded-full";
      yearSpan.textContent = movie.year;
      badgeContainer.appendChild(yearSpan);

      // back button
      document.getElementById("back-btn").href = movie.back || "index.html";

      // store trailer for modal
      window._trailerUrl = movie.trailer;
    }

    loadMovie();

    // ── Modal ─────────────────────────────────────────────────
    function openModal() {
      document.getElementById("trailer-frame").src = window._trailerUrl;
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal").classList.add("flex");
    }
    function closeModal() {
      document.getElementById("trailer-frame").src = "";
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("modal").classList.remove("flex");
    }

    function toggleMenu() {
      document.getElementById("mobile-menu").classList.toggle("hidden");
    }
  </script>
</body>
</html>
